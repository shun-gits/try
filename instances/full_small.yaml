# B-arm + CD-arm 検証用。Cat1 要員が2名(P001,P003)しかおらず、B1 は Cat1 常駐必須。
# 長めの horizon で交代が複数回必要 → 同じ Cat1 が再び B 勤務に就くには間に D 勤務が必要
# （ローテーション交互順）→ CD-arm が使われる。
planning_horizon:
  start: 2026-01-01T00:00:00
  end: 2026-01-07T00:00:00          # 144h
time_granularity_hours: 1

calendar:
  holidays: []

vehicle_types:
  minivan: { capacity: 4, cost_per_hour: 100 }
  truck:   { capacity: 10, cost_per_hour: 180 }

fleet:
  owned:
    - { id: VAN001, type: minivan, initial_location: A }

staffed_sites:
  B1:
    occupancy_min: 1
    category_requirements: { Category1: 1 }
    stay: { min_hours: 24, max_hours: 36 }
    replacement_required: true
    ride_together:
      - [Category1, Category2]
    segments: { inbound_hours: 2, outbound_hours: 2 }

cd_arm:
  a_c_hours: 3
  c_d_hours: 1
  d_c_hours: 1
  c_a_hours: 3

temporary_site:
  # 体重カテゴリ × 同乗総人数 n -> 必要最低滞在h（large は小より長め）。
  d_stay_table:
    small: { 1: 12, 2: 18, 3: 24 }
    large: { 1: 16, 2: 24, 3: 32 }
  occupancy_max: null

passengers:
  - { id: P001, category: Category1, weight: small }
  - { id: P002, category: Category2, weight: large }
  - { id: P003, category: Category1, weight: large }
  - { id: P004, category: Category2, weight: small }

passenger_rules:
  P001: { allowed_sites: [B1] }
  P002: { allowed_sites: [B1] }
  P003: { allowed_sites: [B1] }
  P004: { allowed_sites: [B1] }

initial_state:
  - { passenger_id: P001, location: B1, arrived_at: 2026-01-01T00:00:00 }
  - { passenger_id: P002, location: A }
  - { passenger_id: P003, location: A }
  - { passenger_id: P004, location: A }

solver:
  max_visits_per_passenger: 4
  trips_per_site: 8
  trips_cd: 6
  max_seconds: 60
