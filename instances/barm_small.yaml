# B-arm 縦スライス検証用の小インスタンス。
# 60h（2.5日）、1島(B1)、乗客3名。P001(Cat1) が初期常駐し、最大滞在48h以内に交代が必要。
# 交代要員 P003(Cat1) と together 相棒 P002(Cat2) が同便で到着し、P001 が帰還する想定。
planning_horizon:
  start: 2026-01-01T00:00:00
  end: 2026-01-03T12:00:00          # 60h
time_granularity_hours: 1

calendar:
  holidays: []

vehicle_types:
  minivan:
    capacity: 4
    cost_per_hour: 100
  truck:
    capacity: 10
    cost_per_hour: 180

fleet:
  owned:
    - { id: VAN001, type: minivan, initial_location: A }

staffed_sites:
  B1:
    occupancy_min: 1
    category_requirements:
      Category1: 1
    stay:
      min_hours: 24
      max_hours: 48
    replacement_required: true
    ride_together:
      - [Category1, Category2]
    segments:
      inbound_hours: 2
      outbound_hours: 2

passengers:
  - { id: P001, category: Category1, weight: small }
  - { id: P002, category: Category2, weight: large }
  - { id: P003, category: Category1, weight: large }

passenger_rules:
  P001: { allowed_sites: [B1] }
  P002: { allowed_sites: [B1] }
  P003: { allowed_sites: [B1] }

initial_state:
  - { passenger_id: P001, location: B1, arrived_at: 2026-01-01T00:00:00 }
  - { passenger_id: P002, location: A }
  - { passenger_id: P003, location: A }

solver:
  max_visits_per_passenger: 2
  trips_per_site: 3
  max_seconds: 130
